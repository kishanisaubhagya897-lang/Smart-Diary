<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Diary - Calendar View</title>
    <link rel="stylesheet" href="css/calendar.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>DayNote</h1>
        <button id="backButton"><a href="home.php">← Back</button></a>
      </div>
    </header>

    <main>
      <section class="calendar-container">
        <h2>📆 Calendar</h2>
        <div class="calendar-grid"></div>
      </section>

      <section class="task-manager">
        <h2>📝 Manage Tasks</h2>
        <div class="task-form-wrapper">
          <form id="taskForm">
            <input
              type="text"
              id="taskTitle"
              placeholder="Task Title"
              required
            />
            <textarea
              id="taskDescription"
              placeholder="Task Description"
              required
            ></textarea>
            <input type="date" id="taskDate" required />
            <select id="taskType">
              <option value="Normal">Normal</option>
              <option value="Important">Important</option>
            </select>
            <button type="submit">Add Task</button>
          </form>
        </div>
      </section>

      <section class="task-view">
        <h2>📋 Tasks for Selected Date</h2>
        <div id="tasksContainer" class="task-list"></div>
      </section>

      <section class="completed-tasks">
        <h2>✅ Completed Tasks</h2>
        <ul id="completedTasks"></ul>
        <button id="clearCompletedButton">Clear All Completed Tasks</button>
      </section>
    </main>

    <script src="js/calendar.js"></script>
  </body>
</html>

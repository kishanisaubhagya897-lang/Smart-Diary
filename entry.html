<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Diary Entry</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/entry.css" />
    <style>
      .mood-icon {
        font-size: 30px;
        margin: 0 10px;
        cursor: pointer;
        color: gray;
      }

      .mood-icon.selected {
        color: #01724c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Smart Diary Entry</h1>
      <form
        id="diary-form"
        action="entry.php"
        method="POST"
        enctype="multipart/form-data"
      >
        <div class="entry-metadata">
          <label for="entry-date">Date:</label>
          <input type="date" id="entry-date" name="entry_date" required />
          <label for="entry-time">Time:</label>
          <input type="time" id="entry-time" name="entry_time" required />
        </div>

        <!-- Mood Selector -->
        <div class="mood-selector">
          <span>Select Mood:</span>
          <div class="moods">
            <i
              class="fas fa-grin-beam mood-icon"
              data-mood="happy"
              title="Happy"
            ></i>
            <i class="fas fa-sad-cry mood-icon" data-mood="sad" title="Sad"></i>
            <i
              class="fas fa-meh mood-icon"
              data-mood="neutral"
              title="Neutral"
            ></i>
            <i
              class="fas fa-angry mood-icon"
              data-mood="angry"
              title="Angry"
            ></i>
          </div>
          <input type="hidden" name="mood" id="mood" value="" />
        </div>

        <!-- Sentiment Selector -->
        <div class="sentiment-selector">
          <label for="sentiment">Sentiment:</label>
          <select id="sentiment" name="sentiment">
            <option value="positive">Positive</option>
            <option value="neutral">Neutral</option>
            <option value="negative">Negative</option>
          </select>
        </div>

        <!-- Tags Selector -->
        <div class="tags-selector">
          <label for="entry-tags">Tags:</label>
          <select id="entry-tags" name="tags">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="health">Health</option>
            <option value="hobbies">Hobbies</option>
          </select>
        </div>

        <!-- Quill Editor -->
        <div id="editor" class="editor"></div>
        <input type="hidden" name="diary_content" id="diary_content" />

        <!-- Audio Recording -->
        <div class="audio-recording">
          <label for="audio_file">Record Audio:</label>
          <input
            type="file"
            id="audio_file"
            name="audio_file"
            accept="audio/*"
          />
        </div>

        <!-- Image Upload -->
        <div>
          <label for="images">Add Images:</label>
          <input
            type="file"
            id="images"
            name="images[]"
            multiple
            accept="image/*"
          />
        </div>

        <!-- Save Button -->
        <button type="submit" class="button">Save Entry</button>
      </form>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Initialize Quill editor
        var quill = new Quill("#editor", {
          theme: "snow",
          modules: {
            toolbar: [
              [{ header: "1" }, { header: "2" }, { font: [] }],
              [{ list: "ordered" }, { list: "bullet" }],
              [{ align: [] }],
              ["bold", "italic", "underline"],
              ["link", "image"],
            ],
          },
        });

        // Save Quill content to a hidden input field
        document
          .getElementById("diary-form")
          .addEventListener("submit", function () {
            const content = quill.root.innerHTML;
            document.getElementById("diary_content").value = content;
          });

        // Mood selection functionality
        const moodIcons = document.querySelectorAll(".mood-icon");
        const moodInput = document.getElementById("mood");

        moodIcons.forEach((icon) => {
          icon.addEventListener("click", function () {
            // Remove 'selected' class from all icons
            moodIcons.forEach((icon) => icon.classList.remove("selected"));

            // Add 'selected' class to the clicked icon
            this.classList.add("selected");

            // Set the mood value in the hidden input
            moodInput.value = this.getAttribute("data-mood");
          });
        });
      });
    </script>
  </body>
</html>
